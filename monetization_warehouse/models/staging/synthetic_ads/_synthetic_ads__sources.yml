version: 2

sources:
  - name: synthetic_ads
    description: >
      Synthetic ad-revenue events (ad_request, ad_impression, ad_revenue)
      generated by scripts/data/generate_synthetic_ad_events.py and loaded
      to monetization-warehouse:raw.synthetic_ad_events. Calibrated to
      published industry benchmarks; see ADR-0013 for the reasoning and
      the generator's docstring for citations. Every row has
      is_synthetic = TRUE.
    database: monetization-warehouse
    schema: raw
    tables:
      - name: synthetic_ad_events
        description: One row per ad event (request, impression, or revenue).
        loaded_at_field: TIMESTAMP_MICROS(event_timestamp_us)
