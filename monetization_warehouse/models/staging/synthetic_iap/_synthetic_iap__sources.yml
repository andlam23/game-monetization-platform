version: 2

sources:
  - name: synthetic_iap
    description: >
      Synthetic IAP events (iap_purchase) generated by
      scripts/data/generate_synthetic_iap_events.py and loaded to
      monetization-warehouse:raw.synthetic_iap_events. ~3% paying
      conversion, log-normal LTV with percentile-based whale segmentation
      that produces ~70% whale-revenue concentration. See ADR-0013 for
      the full scope amendment (Flood-It only has 17 real IAPs across 5
      months — too sparse to be analytically useful). Every row has
      is_synthetic = TRUE.
    database: monetization-warehouse
    schema: raw
    tables:
      - name: synthetic_iap_events
        description: One row per IAP purchase.
        loaded_at_field: TIMESTAMP_MICROS(event_timestamp_us)
