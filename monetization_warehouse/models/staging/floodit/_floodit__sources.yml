version: 2

sources:
  - name: floodit
    description: >
      Real F2P puzzle-game event data from Google's GA4 sample dataset
      (Flood-It! by LabPixies). 114 daily-sharded tables (events_YYYYMMDD);
      the populated window is 2018-08-01 → 2018-10-03 (~3.2M events;
      later tables exist but are empty). Read in place — not copied into
      our project — per ADR-0013. CC-BY 4.0.
    database: firebase-public-project
    schema: analytics_153293282
    tables:
      - name: events
        identifier: 'events_*'
        description: >
          Daily-sharded GA4 event tables. ~64 days of populated events
          covering screen_view, user_engagement, level_start_quickplay,
          level_end_quickplay, level_complete_quickplay, post_score, IAP
          (ecommerce field — only 17 events total, see ADR-0013), and
          attribution (traffic_source).
        loaded_at_field: TIMESTAMP_MICROS(event_timestamp)
        # Cross-project queries are billed against monetization-warehouse's
        # 1 TB/month free tier — staging models must filter on _TABLE_SUFFIX
        # (event_date) to avoid scanning all shards.
