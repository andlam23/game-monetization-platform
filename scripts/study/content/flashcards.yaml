- deck: numbers
  prompt: "dbt test counts and what they test"
  answer: |
    12 dbt tests in _<domain>__models.yml files.
    dim_players:
      - unique + not_null on user_pseudo_id
      - not_null on ltv_usd, is_payer, payer_segment
      - accepted_values on payer_segment ('whale','dolphin','minnow','non_payer')
    fct_revenue_daily: not_null on event_date, user_pseudo_id, total_revenue_usd,
      is_active_today, is_paying_today
    fct_retention_cohorts: not_null on cohort_date, day_offset, cohort_size,
      retention_rate
